[build]
  base = "dashboard/bathresurf-nsw-dashboard/"
  command = "npm run build"
  publish = "dist"

# SPA routing — serve index.html for any route that doesn't match a real file.
# Required because react-router uses client-side routes (e.g. /tasks, /finances)
# that aren't real folders on disk.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
